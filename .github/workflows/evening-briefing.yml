name: Evening Briefing

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      STORAGE_PROVIDER: ${{ secrets.STORAGE_PROVIDER }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RUNTIME_CONFIG_PROVIDER: ${{ secrets.RUNTIME_CONFIG_PROVIDER }}
      RUNTIME_CONFIG_ID: ${{ secrets.RUNTIME_CONFIG_ID }}
      VOICE_PROVIDER: ${{ secrets.VOICE_PROVIDER }}
      PIPER_BIN: ${{ secrets.PIPER_BIN }}
      PIPER_MODEL: ${{ secrets.PIPER_MODEL }}
      EDGE_TTS_VOICE: ${{ secrets.EDGE_TTS_VOICE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest
      - name: Send evening briefing
        run: python src/main.py --run-type evening
